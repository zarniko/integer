<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>integer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap');

    :root {
      --bg: #0000ff;
      --ui-bg: #0000cc;
      --accent: #00ff00;
      --highlight: #00ffff;
      --text: #ffffff;
    }

    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body { 
      width: 100%; height: 100%; overflow: hidden; 
      background: var(--bg); color: var(--text);
      font-family: 'Roboto Mono', monospace;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
      transition: background 0.2s ease;
    }

    *:focus {
      outline: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #grid {
      flex: 1;
      display: flex;
      padding: 0;
      cursor: pointer;
    }

    .pane {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      height: 100%;
    }

    #number-display {
      font-size: 380px; 
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #shape-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .shape-row {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .circle {
      width: 80px;
      height: 80px;
      background: var(--accent);
      border-radius: 50%;
      transition: background 0.2s ease;
    }

    /* ── Controls ────────────────────────────────────────── */
    #controls {
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      background: var(--bg);
      padding: 0;
      transition: background 0.2s ease;
    }

    #number-line-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #theme-selector {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 16px;
      cursor: pointer;
    }

    #theme-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transition: background 0.2s ease;
    }

#number-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80px;
      padding: 0 60px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .marker {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      border: none;
      transition: color 0.1s, font-size 0.1s;
    }

    .marker:hover {
      color: var(--highlight);
    }

    .marker.active {
      color: var(--text);
      font-size: 42px;
    }

    /* ── Negative State ─────────────────────────────────── */
    .negative #number-display {
      color: var(--accent);
    }
    .negative .circle {
      background: var(--text);
    }

    @media (max-width: 1024px) {
      #number-display { font-size: 280px; }
      .circle { width: 55px; height: 55px; }
      .marker { font-size: 24px; width: 60px; }
      .marker.active { font-size: 34px; }
    }

    @media (max-width: 768px) {
      #number-display { font-size: 200px; }
      .circle { width: 40px; height: 40px; }
      #grid { flex-direction: column; }
      #number-line { padding: 0 20px; }
      .marker { font-size: 18px; width: 35px; }
      .marker.active { font-size: 26px; }
      #controls { height: 140px; } /* Slightly increased height to accommodate padding */
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="grid">
      <div id="left-pane" class="pane">
        <div id="number-display">0</div>
      </div>
      <div id="right-pane" class="pane">
        <div id="shape-container"></div>
      </div>
    </div>

    <div id="controls">
      <div id="number-line-container">
        <div id="theme-selector"></div>
        <div id="number-line"></div>
      </div>
    </div>
  </div>

  <script>
    const numberDisplay = document.getElementById('number-display');
    const shapeContainer = document.getElementById('shape-container');
    const numberLine = document.getElementById('number-line');
    const themeSelector = document.getElementById('theme-selector');
    const app = document.getElementById('app');

    let currentNumber = 0;
    let windowStart = 0;
    let currentThemeIdx = 0;

    const THEMES = [
      { bg: '#2e00ff', ui: '#1a00b3', accent: '#00ff41', highlight: '#00ffff' }, // Blue / Green / Cyan
      { bg: '#ff00ff', ui: '#b300b3', accent: '#ffff00', highlight: '#ffffff' }, // Magenta / Yellow / White
      { bg: '#ff4d00', ui: '#cc3d00', accent: '#7000ff', highlight: '#ff00ff' }  // Orange / Purple / Pink
    ];

    function setTheme(idx) {
      currentThemeIdx = idx;
      const theme = THEMES[idx];
      document.documentElement.style.setProperty('--bg', theme.bg);
      document.documentElement.style.setProperty('--ui-bg', theme.ui);
      document.documentElement.style.setProperty('--accent', theme.accent);
      document.documentElement.style.setProperty('--highlight', theme.highlight);
      const nextTheme = THEMES[(idx + 1) % THEMES.length];
      document.getElementById('theme-dot').style.background = nextTheme.accent;
    }

    function initThemes() {
      const dot = document.createElement('div');
      dot.id = 'theme-dot';
      dot.addEventListener('click', () => setTheme((currentThemeIdx + 1) % THEMES.length));
      themeSelector.appendChild(dot);
      setTheme(0);
    }

    // ── Audio ────────────────────────────────────────────
    let audioCtx = null;
    let reverbNode = null;

    // C major pentatonic ascending: positive = bright high (1→10), negative = dark low (−1→−10)
    const POS_FREQS = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3, 784.0, 880.0];
    const NEG_FREQS = [130.8, 146.8, 164.8, 196.0, 220.0, 261.6, 293.7, 329.6, 392.0, 440.0];

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      reverbNode = audioCtx.createConvolver();
      const sr = audioCtx.sampleRate;
      const len = Math.floor(sr * 2.0);
      const impulse = audioCtx.createBuffer(2, len, sr);
      for (let c = 0; c < 2; c++) {
        const ch = impulse.getChannelData(c);
        for (let i = 0; i < len; i++) {
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.0);
        }
      }
      reverbNode.buffer = impulse;
      const wetGain = audioCtx.createGain();
      wetGain.gain.value = 0.22;
      reverbNode.connect(wetGain);
      wetGain.connect(audioCtx.destination);
    }

    function playPartial(freq, gain, decay, sweepTo) {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      if (sweepTo !== undefined) {
        osc.frequency.exponentialRampToValueAtTime(sweepTo, now + 0.1);
      }
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(gain, now + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
      osc.connect(g);
      g.connect(audioCtx.destination);
      g.connect(reverbNode);
      osc.start(now);
      osc.stop(now + decay + 0.1);
    }

    function playNumberSound(n) {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      if (n === 0) {
        // Neutral pure bell, D4
        playPartial(293.7, 0.35, 1.6);
        playPartial(587.3, 0.08, 0.9);
        return;
      }

      if (n > 0) {
        const freq = POS_FREQS[n - 1];
        // Bright rising: fundamental sweeps up from 7% flat → pitch
        playPartial(freq * 0.93, 0.45, 1.4, freq);
        playPartial(freq * 2, 0.15, 0.85);
        playPartial(freq * 4, 0.04, 0.45);
      } else {
        const freq = NEG_FREQS[Math.abs(n) - 1];
        // Dark falling: sub-octave weight + fundamental sweeps down 7%
        playPartial(freq * 0.5, 0.18, 2.2);
        playPartial(freq, 0.4, 2.0, freq * 0.93);
        playPartial(freq * 3, 0.06, 0.7);
      }
    }

    // ── Interaction ──────────────────────────────────────
    document.getElementById('left-pane').addEventListener('click', () => {
      if (currentNumber > -10) {
        currentNumber--;
        updateDisplay();
        playNumberSound(currentNumber);
      }
    });

    document.getElementById('right-pane').addEventListener('click', () => {
      if (currentNumber < 10) {
        currentNumber++;
        updateDisplay();
        playNumberSound(currentNumber);
      }
    });

    // ── Logic ────────────────────────────────────────────
    function updateNumberLine() {
      // Shift window if currentNumber goes out of bounds
      if (currentNumber < windowStart) {
        windowStart = currentNumber;
      } else if (currentNumber > windowStart + 10) {
        windowStart = currentNumber - 10;
      }
      
      // Clamp window range to stay within [-10, 10] while showing 11 markers
      windowStart = Math.max(-10, Math.min(0, windowStart));

      numberLine.innerHTML = '';
      for (let i = windowStart; i <= windowStart + 10; i++) {
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.textContent = i;
        marker.dataset.value = i;
        marker.classList.toggle('active', i === currentNumber);
        marker.addEventListener('click', (e) => {
          e.stopPropagation();
          currentNumber = i;
          updateDisplay();
          playNumberSound(currentNumber);
        });
        numberLine.appendChild(marker);
      }
    }

    function updateDisplay() {
      numberDisplay.textContent = currentNumber;
      app.classList.toggle('negative', currentNumber < 0);
      
      updateNumberLine();

      shapeContainer.innerHTML = '';
      let count = 0;
      const absVal = Math.abs(currentNumber);
      
      for (let row = 1; count < absVal; row++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'shape-row';
        shapeContainer.appendChild(rowEl);
        
        for (let i = 0; i < row && count < absVal; i++) {
          const sq = document.createElement('div');
          sq.className = 'circle';
          rowEl.appendChild(sq);
          count++;
        }
      }
    }

    initThemes();
    updateDisplay();
  </script>
</body>
</html>
